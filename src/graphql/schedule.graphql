fragment scheduleFields on Schedule {
  _id
  createdAt
  date
  status
  comment
  user {
    ...userFields
  }
}

query FindSchedules(
  $user: ID
  $users: [ID]
  $tags: [String]
  $requiredTags: [String]
  $startDate: Float
  $endDate: Float
) {
  findSchedules(
    user: $user
    users: $users
    tags: $tags
    requiredTags: $requiredTags
    startDate: $startDate
    endDate: $endDate
  ) {
    ...scheduleFields
  }
}

mutation CreateSchedule(
  $status: String!
  $comment: String
  $date: Float!
  $user: ID
) {
  createSchedule(
    input: { status: $status, comment: $comment, date: $date, user: $user }
  ) {
    ...scheduleFields
  }
}

subscription scheduleCreated(
  $user: ID
  $users: [ID]
  $tags: [String]
  $requiredTags: [String]
  $startDate: Float
  $endDate: Float
) {
  scheduleCreated(
    user: $user
    users: $users
    tags: $tags
    requiredTags: $requiredTags
    startDate: $startDate
    endDate: $endDate
  ) {
    ...scheduleFields
  }
}
